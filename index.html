<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Adventure Game</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@700;900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="game-header">
            <div id="game-title">Adventure Awaits</div>
        </div>

        <div id="timer-bar-bg" style="display: none; width: 100%; height: 6px; background: #334155; margin-bottom: 10px;">
            <div id="timer-bar-fill" style="width: 100%; height: 100%; background: #ef4444; transition: width 0s linear;"></div>
        </div>

        <header id="top-bar">                        
            <div id="backpack-container">
                <strong>Pockets</strong>
                <ul id="inventory-list"></ul>
            </div>
        </header>

        <div id="story-text">Loading your adventure...</div>

        <div id="base-container">
            <div id="choices-container"></div>
            <button id="reset-btn">Restart Adventure</button>
        </div>

        <div id="minigame-modal" style="display:none;">
            <h2 id="minigame-header">Title</h2>
            <p id="minigame-description">Description goes here</p>
            
            <div id="minigame-feedback" style="display:none;">
                <p id="minigame-feedback-text"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
